<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북촌레인스쿠키 | 행운 뽑기</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: linear-gradient(160deg, #f7f1e6 0%, #efe3d0 50%, #e7d8bf 100%);
    color: #5a4632;
    display: flex;
    justify-content: center;
    padding: 32px 16px 60px;
  }
  .wrap {
    width: 100%;
    max-width: 460px;
  }
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo {
    font-size: 40px;
    margin-bottom: 6px;
  }
  .brand {
    font-size: 14px;
    letter-spacing: 2px;
    color: #a98a5b;
    font-weight: 600;
  }
  h1 {
    font-size: 24px;
    margin: 8px 0 4px;
    color: #5a4632;
  }
  .desc {
    font-size: 13.5px;
    color: #8a7456;
    line-height: 1.6;
  }
  .card-panel {
    background: #fffaf2;
    border: 1px solid #e6d7bd;
    border-radius: 20px;
    padding: 26px 22px;
    box-shadow: 0 8px 24px rgba(160, 130, 80, 0.12);
  }
  .step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #a98a5b;
    font-weight: 700;
    margin-bottom: 14px;
  }
  .step span.num {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #d8b984;
    color: #fff;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .review-btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #d8b984, #c79f63);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    text-align: center;
    box-shadow: 0 6px 16px rgba(199, 159, 99, 0.35);
  }
  .review-btn:active { transform: scale(0.98); }
  .divider {
    margin: 24px 0;
    border-top: 1px dashed #e0cfae;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 16px;
  }
  .cell {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 14px;
    background: linear-gradient(145deg, #f1e3c8, #e3cda0);
    border: 1px solid #e0cfae;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .cell:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(160,130,80,0.2); }
  .cell.disabled { cursor: default; opacity: 0.45; }
  .cell.opened {
    background: #fffaf2;
    border-color: #d8b984;
  }
  .cell .cookie {
    transition: opacity 0.2s ease;
  }
  .locked-msg {
    text-align: center;
    font-size: 13px;
    color: #b08c54;
    margin-top: 10px;
    display: none;
  }
  .result {
    margin-top: 22px;
    text-align: center;
    display: none;
  }
  .result.show { display: block; }
  .result .badge {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 999px;
    background: #5a4632;
    color: #fffaf2;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .result .prize {
    font-size: 22px;
    font-weight: 800;
    color: #a9722e;
    margin-bottom: 6px;
  }
  .result .note {
    font-size: 12.5px;
    color: #8a7456;
    line-height: 1.6;
  }
  .footer {
    text-align: center;
    margin-top: 26px;
    font-size: 11.5px;
    color: #b3a280;
    line-height: 1.7;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">🍪</div>
    <div class="brand">BUKCHON RAIN COOKIE</div>
    <h1>북촌레인스쿠키 행운 뽑기</h1>
    <div class="desc">리뷰 남기고, 오늘의 행운 쿠키를 뽑아보세요!</div>
  </div>

  <div class="card-panel">
    <div class="step"><span class="num">1</span> 구글 리뷰 남기기</div>
    <a id="reviewBtn" class="review-btn" href="https://g.page/r/CY1AVLi5ondnEBM/review" target="_blank" rel="noopener">⭐ 구글 리뷰 작성하러 가기</a>

    <div class="divider"></div>

    <div class="step"><span class="num">2</span> 쿠키 박스를 골라 뽑기 참여</div>
    <div class="grid" id="grid"></div>
    <div class="locked-msg" id="lockedMsg">오늘은 이미 뽑기에 참여하셨어요. 내일 다시 도전해 주세요 🍪</div>

    <div class="result" id="result">
      <div class="badge">당첨 결과</div>
      <div class="prize" id="prizeText"></div>
      <div class="note">매장 직원에게 화면을 보여주시면 혜택을 받을 수 있어요.</div>
    </div>
  </div>

  <div class="footer">
    하루 1회 참여 가능합니다 · 매장 방문 시 화면 캡처 또는 직접 보여주세요<br>
    북촌레인스쿠키
  </div>
</div>

<script>
  const PRIZES = [
    "쿠키 1개 무료",
    "전 메뉴 10% 할인",
    "아메리카노 무료",
    "쿠키 2개 무료",
    "다음 기회에 😢",
    "음료 사이즈업",
    "쿠키 1개 무료",
    "다음 기회에 😢",
    "전 메뉴 15% 할인"
  ];

  const STORAGE_KEY = "grainsLuckyLastPlay";

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const grid = document.getElementById("grid");
  const lockedMsg = document.getElementById("lockedMsg");
  const result = document.getElementById("result");
  const prizeText = document.getElementById("prizeText");

  const alreadyPlayed = localStorage.getItem(STORAGE_KEY) === todayStr();
  const order = shuffle(PRIZES);
  let played = alreadyPlayed;

  order.forEach((prize) => {
    const cell = document.createElement("div");
    cell.className = "cell" + (played ? " disabled" : "");
    cell.innerHTML = '<span class="cookie">🍪</span>';
    cell.addEventListener("click", () => {
      if (played) return;
      played = true;
      localStorage.setItem(STORAGE_KEY, todayStr());

      document.querySelectorAll(".cell").forEach((c) => c.classList.add("disabled"));
      cell.classList.add("opened");
      cell.innerHTML = '<span class="cookie">🎉</span>';

      prizeText.textContent = prize;
      result.classList.add("show");
    });
    grid.appendChild(cell);
  });

  if (alreadyPlayed) {
    lockedMsg.style.display = "block";
  }
</script>
</body>
</html>
